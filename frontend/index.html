<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saksi Audio Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #a78bfa;
            background: rgba(167, 139, 250, 0.1);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }

        .file-info {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 500;
        }

        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .result-box.show {
            display: block;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .badge.real {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge.fake {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .confidence {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        .confidence span {
            font-size: 16px;
            color: #94a3b8;
            font-weight: 400;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-message {
            color: #f87171;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Saksi AI Audio</h1>
        <p class="subtitle">Deepfake and Synthesized Voice Detection</p>

        <div class="upload-area" id="drop-zone">
            <span class="upload-icon">🎵</span>
            <p class="file-info" id="file-name">Click or drag an audio file (.wav)</p>
            <input type="file" id="file-input" accept="audio/*">
        </div>

        <button class="btn" id="analyze-btn" disabled>
            <span id="btn-text">Analyze Audio</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="error-message" id="error-msg"></div>

        <div class="result-box" id="result-box">
            <div class="badge" id="result-badge">Real Audio</div>
            <div class="confidence" id="confidence-score">99.9% <span>Confidence</span></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');
        const analyzeBtn = document.getElementById('analyze-btn');
        const btnText = document.getElementById('btn-text');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result-box');
        const resultBadge = document.getElementById('result-badge');
        const confidenceScore = document.getElementById('confidence-score');
        const errorMsg = document.getElementById('error-msg');

        let selectedFile = null;

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                fileNameDisplay.textContent = selectedFile.name;
                analyzeBtn.disabled = false;
                resultBox.classList.remove('show');
                errorMsg.style.display = 'none';
            }
        });

        // Drag and drop styles
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                selectedFile = e.dataTransfer.files[0];
                fileInput.files = e.dataTransfer.files;
                fileNameDisplay.textContent = selectedFile.name;
                analyzeBtn.disabled = false;
                resultBox.classList.remove('show');
                errorMsg.style.display = 'none';
            }
        });

        // Convert File to Base64
        const fileToBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        };

        // Handle Analysis
        analyzeBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI Loading state
            analyzeBtn.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultBox.classList.remove('show');
            errorMsg.style.display = 'none';

            try {
                const base64Audio = await fileToBase64(selectedFile);

                // Fetch prediction from backend
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        base64_audio: base64Audio
                    })
                });

                if (!response.ok) throw new Error('Failed to analyze audio.');

                const data = await response.json();
                
                // Show Result
                resultBadge.textContent = data.prediction === 'real' ? 'Authentic human' : 'AI Generated';
                resultBadge.className = `badge ${data.prediction}`;
                
                const percentage = (data.confidence * 100).toFixed(1);
                confidenceScore.innerHTML = `${percentage}% <span>Confidence</span>`;
                
                resultBox.classList.add('show');
                
            } catch (error) {
                console.error(error);
                errorMsg.textContent = "Error: Could not reach the API. Make sure FastAPI is running on port 8000.";
                errorMsg.style.display = 'block';
            } finally {
                // UI Reset state
                analyzeBtn.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
