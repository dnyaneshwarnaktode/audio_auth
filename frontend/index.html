<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saksi Audio Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Saksi AI Audio</h1>
        <p class="subtitle">Deepfake and Synthesized Voice Detection</p>

        <div class="upload-area" id="drop-zone">
            <span class="upload-icon">🎵</span>
            <p class="file-info" id="file-name">Click or drag an audio file (.wav)</p>
            <input type="file" id="file-input" accept="audio/*">
        </div>

        <button class="btn" id="analyze-btn" disabled>
            <span id="btn-text">Analyze Audio</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="error-message" id="error-msg"></div>

        <div class="result-box" id="result-box">
            <div class="badge" id="result-badge">Real Audio</div>
            <div class="confidence" id="confidence-score">99.9% <span>Confidence</span></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
